name: Build EWDK Demos on Windows

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载并安装Ninja
        run: |
          Invoke-WebRequest -Uri "https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip" -OutFile "$env:TEMP\ninja.zip"
          Expand-Archive -Path "$env:TEMP\ninja.zip" -DestinationPath "$env:TEMP\ninja" -Force
          Copy-Item "$env:TEMP\ninja\ninja.exe" "$env:TEMP\ninja.exe" -Force
          Write-Host "Ninja version: $(& "$env:TEMP\ninja.exe" --version)"

      - name: 获取并设置EWDK ISO URL
        id: set-url
        run: go run scripts/get_ewdk_url.go

      - name: 下载EWDK ISO
        run: |
          $cleanUrl = $env:EWDK_ISO_URL -replace '\s', ''
          Write-Host "Downloading EWDK ISO from: $cleanUrl"
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $cleanUrl -OutFile "$env:TEMP\ewdk.iso" -UseBasicParsing
          $fileSize = (Get-Item "$env:TEMP\ewdk.iso").Length
          Write-Host "ISO downloaded: $([math]::Round($fileSize/1MB, 2)) MB"

      - name: 挂载ISO
        run: |
          $mountResult = Mount-DiskImage -ImagePath "$env:TEMP\ewdk.iso" -PassThru
          $driveLetter = ($mountResult | Get-Volume).DriveLetter
          Write-Host "ISO mounted as drive: ${driveLetter}:"
          Write-Host "EWDK drive letter: ${driveLetter}:" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: 设置WDK环境并构建
        run: |
          $ewdkDrive = $env:EWDK_DRIVE_LETTER.Trim()
          $ewdkPath = "${ewdkDrive}:\EWDK"
          Write-Host "EWDK path: $ewdkPath"

          # 复制EWDK内容到工作目录作为WDK
          $wdkContent = "$env:GITHUB_WORKSPACE\wdk_content"
          New-Item -ItemType Directory -Force -Path $wdkContent | Out-Null
          Copy-Item -Path "$ewdkPath\*" -Destination $wdkContent -Recurse -Force
          Write-Host "EWDK content copied to: $wdkContent"

          # 设置WDK环境变量
          Write-Host "WDKContentRoot=$wdkContent" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "WDK_ROOT=$wdkContent" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: 运行build.bat
        run: |
          $env:WDKContentRoot = "$env:GITHUB_WORKSPACE\wdk_content"
          $env:WDK_ROOT = "$env:GITHUB_WORKSPACE\wdk_content"
          & "$env:GITHUB_WORKSPACE\build.bat"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ewdk-build-output
          path: |
            build/demo/um-exe/*.exe
            build/demo/um-lib/*.lib
            build/demo/um-dll/*.dll
            build/demo/kernel/*.sys
          retention-days: 7

      - name: 卸载ISO
        if: always()
        run: |
          Dismount-DiskImage -ImagePath "$env:TEMP\ewdk.iso" -Confirm:$false
          Remove-Item "$env:TEMP\ewdk.iso" -Force -ErrorAction SilentlyContinue
          Write-Host "Cleanup completed"
