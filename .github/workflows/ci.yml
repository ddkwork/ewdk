name: build-ewdk

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  BUILD_OUTPUT_DIR: ewdk-build
  RELEASE_ZIP_FILE_NAME: ewdk

jobs:
  test:
    name: Test build configuration
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install aria2
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "$env:TEMP\aria2.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\aria2.zip" -DestinationPath "$env:TEMP\aria2" -Force
          Get-ChildItem "$env:TEMP\aria2" -Filter "aria2c.exe" -Recurse | Move-Item -Destination "$env:TEMP\aria2c.exe" -Force
          Write-Host "aria2 installed: $env:TEMP\aria2c.exe"
          & "$env:TEMP\aria2c.exe" --version

      - name: Cache EWDK ISO
        id: cache-iso
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\ewdk.iso
          key: ewdk-iso-${{ hashFiles('scripts/get_ewdk_url.go') }}
          restore-keys: |
            ewdk-iso-

      - name: Download EWDK ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          go run scripts/get_ewdk_url.go
          $ewdkUrl = Get-Content "$env:GITHUB_ENV" | Select-String "EWDK_ISO_URL=" | ForEach-Object { $_.ToString().Replace("EWDK_ISO_URL=", "").Trim() }
          Write-Host "Downloading EWDK ISO from: $ewdkUrl"
          & "$env:TEMP\aria2c.exe" -x16 -s16 --file-allocation=none -d "$env:TEMP" -o ewdk.iso $ewdkUrl
          $fileSize = (Get-Item "$env:TEMP\ewdk.iso").Length
          Write-Host "ISO downloaded: $([math]::Round($fileSize/1MB, 2)) MB"

      - name: Mount ISO and generate ewdk.cmake
        run: |
          go run .

      - name: Build Release and Debug
        run: |
          set "C=C:\Program Files\CMake\bin\cmake.exe"
          "%C%" -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release . && "%C%" --build build --config Release
          "%C%" -B build_debug -G "Ninja" -DCMAKE_BUILD_TYPE=Debug . && "%C%" --build build_debug --config Debug
        shell: cmd

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Delete existing release
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 0
          delete_tag_pattern: ci-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create local tag
        run: |
          git tag -f ci-release

      - name: Push tag
        run: |
          git push origin ci-release --force

      - name: Get commit info
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "date=$(Get-Date -Format 'yyyy-MM-dd')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create source archive
        run: |
          Compress-Archive -Path "*" -DestinationPath "${{ env.RELEASE_ZIP_FILE_NAME }}-ci-release.zip" -Force
          Write-Host "Archive created: ${{ env.RELEASE_ZIP_FILE_NAME }}-ci-release.zip"

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ci-release
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-ci-release.zip
          body: |
            EWDK Build - CI Release

            Build Date: ${{ steps.commit_info.outputs.date }}
            Commit: ${{ steps.commit_info.outputs.commit }}
            Branch: ${{ github.ref_name }}
          draft: false
          prerelease: true
          overwrite_files: true
