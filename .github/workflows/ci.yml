name: build-ewdk

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  BUILD_OUTPUT_DIR: ewdk-build
  RELEASE_ZIP_FILE_NAME: ewdk

jobs:
  test:
    name: Test build configuration
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装Ninja
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\ninja.exe" "$env:TEMP\ninja.exe" -Force
          Write-Host "Ninja version: $(& "$env:TEMP\ninja.exe" --version)"

  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装Ninja
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\ninja.exe" "$env:TEMP\ninja.exe" -Force
          Write-Host "Ninja version: $(& "$env:TEMP\ninja.exe" --version)"

      - name: 安装 aria2
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "$env:TEMP\aria2.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\aria2.zip" -DestinationPath "$env:TEMP\aria2" -Force
          Get-ChildItem "$env:TEMP\aria2" -Filter "aria2c.exe" -Recurse | Move-Item -Destination "$env:TEMP\aria2c.exe" -Force
          Write-Host "aria2 installed: $env:TEMP\aria2c.exe"
          & "$env:TEMP\aria2c.exe" --version

      - name: 缓存EWDK ISO
        id: cache-iso
        uses: actions/cache@v5
        with:
          path: ${{ env.TEMP }}\ewdk.iso
          key: ewdk-iso-${{ hashFiles('scripts/get_ewdk_url.go') }}
          restore-keys: |
            ewdk-iso-

      - name: 下载EWDK ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          go run scripts/get_ewdk_url.go
          $ewdkUrl = Get-Content "$env:GITHUB_ENV" | Select-String "EWDK_ISO_URL=" | ForEach-Object { $_.ToString().Replace("EWDK_ISO_URL=", "").Trim() }
          Write-Host "Downloading EWDK ISO from: $ewdkUrl"
          & "$env:TEMP\aria2c.exe" -x16 -s16 --file-allocation=none -d "$env:TEMP" -o ewdk.iso $ewdkUrl
          $fileSize = (Get-Item "$env:TEMP\ewdk.iso").Length
          Write-Host "ISO downloaded: $([math]::Round($fileSize/1MB, 2)) MB"

      - name: 挂载ISO并构建
        run: |
          go run .

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 获取 commit 信息
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "date=$(Get-Date -Format 'yyyy-MM-dd')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 创建源码压缩包
        run: |
          Compress-Archive -Path "*" -DestinationPath "${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip" -Force
          Write-Host "Archive created: ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip"

      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip
          body: |
            EWDK Build - ${{ github.ref_name }}

            Build Date: ${{ steps.commit_info.outputs.date }}
            Commit: ${{ steps.commit_info.outputs.commit }}
            Branch: ${{ github.ref_name }}
