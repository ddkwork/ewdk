name: build-ewdk

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  BUILD_OUTPUT_DIR: ewdk-build
  RELEASE_ZIP_FILE_NAME: ewdk

jobs:
  test:
    name: Test build configuration
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装Ninja
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\ninja.exe" "$env:TEMP\ninja.exe" -Force
          Write-Host "Ninja version: $(& "$env:TEMP\ninja.exe" --version)"

  build:
    needs: test
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装Ninja
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\ninja.exe" "$env:TEMP\ninja.exe" -Force
          Write-Host "Ninja version: $(& "$env:TEMP\ninja.exe" --version)"

      - name: 获取并设置EWDK ISO URL
        id: set-url
        run: go run scripts/get_ewdk_url.go

      - name: 下载EWDK ISO
        run: |
          $cleanUrl = $env:EWDK_ISO_URL -replace '\s', ''
          Write-Host "Downloading EWDK ISO from: $cleanUrl"
          $ProgressPreference = 'SilentlyContinue'
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri $cleanUrl -OutFile "$env:TEMP\ewdk.iso" -UseBasicParsing
          $fileSize = (Get-Item "$env:TEMP\ewdk.iso").Length
          Write-Host "ISO downloaded: $([math]::Round($fileSize/1MB, 2)) MB"

      - name: 挂载ISO
        run: |
          & "$env:GITHUB_WORKSPACE\mount-task.ps1"

      - name: 复制ewdk.cmake到EWDK
        run: |
          Copy-Item "$env:GITHUB_WORKSPACE\ewdk.cmake" "D:\EWDK\ewdk.cmake" -Force
          Write-Host "ewdk.cmake copied to E:\EWDK"

      - name: 设置WDK环境并构建
        run: |
          $env:WDKContentRoot = "E:\EWDK"
          $env:WDK_ROOT = "E:\EWDK"
          & "$env:GITHUB_WORKSPACE\build.bat"

  release:
    if: false
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 获取 commit 信息
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "date=$(Get-Date -Format 'yyyy-MM-dd')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 创建源码压缩包
        run: |
          Compress-Archive -Path "*" -DestinationPath "${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip" -Force
          Write-Host "Archive created: ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip"

      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip
          body: |
            EWDK Build - ${{ github.ref_name }}

            Build Date: ${{ steps.commit_info.outputs.date }}
            Commit: ${{ steps.commit_info.outputs.commit }}
            Branch: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}

  deploy-latest:
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 获取 commit 信息
        id: commit_info
        run: |
          echo "commit=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          echo "date=$(Get-Date -Format 'yyyy-MM-dd')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: 创建源码压缩包
        run: |
          Compress-Archive -Path "*" -DestinationPath "${{ env.RELEASE_ZIP_FILE_NAME }}-latest.zip" -Force
          Write-Host "Archive created: ${{ env.RELEASE_ZIP_FILE_NAME }}-latest.zip"

      - name: 发布 Latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: EWDK - Latest Build
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-latest.zip
          body: |
            EWDK - Latest Build

            Build Date: ${{ steps.commit_info.outputs.date }}
            Commit: ${{ steps.commit_info.outputs.commit }}
            Branch: ${{ github.ref_name }}

            This release is automatically updated with each successful master build.
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
